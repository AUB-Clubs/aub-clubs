apiVersion: batch/v1
kind: Job
metadata:
  name: db-seeding
  namespace: aub-clubs
spec:
  template:
    spec:
      containers:
        - name: seed
          image: hamzarach69/aub-clubs-seed:b8ec74c
          envFrom:
            - secretRef:
                name: aub-clubs-runtime-secrets
      restartPolicy: OnFailure
