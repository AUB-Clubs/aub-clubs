version: "3"

env:
  CLUSTER_NAME: aub-clubs-app
  GCP_REGION: us-central1
  GCP_ZONE: us-central1-a
  GCP_PROJECT_ID: project-b2a5c546-f972-43e5-954
  CLUSTER_NAME_STAGING: aub-clubs-app-staging
  EXTERNAL_SECRETS_GSA_NAME: aub-clubs-external-secrets
  EXTERNAL_SECRETS_GSA_EMAIL: aub-clubs-external-secrets@project-b2a5c546-f972-43e5-954.iam.gserviceaccount.com

tasks:
  helm-pull:
    cmds:
      - kluctl helm-pull
    desc: "Pre-pull helm charts"

  render-staging:
    cmds:
      - kluctl render -t staging --print-all | yq
    desc: "Render resource yaml with staging values"

  deploy-staging:
    cmds:
      - kluctl deploy -t staging
    desc: "Deploy staging configuration"

  delete-staging:
    cmds:
      - kluctl delete -t staging
    desc: "Render resource yaml with staging values"

  render-production:
    cmds:
      - kluctl render -t production --print-all | yq
    desc: "Render resource yaml with production values"

  deploy-production:
    cmds:
      - kluctl deploy -t production
    desc: "Deploy production configuration"

  delete-production:
    cmds:
      - kluctl delete -t production
    desc: "Render resource yaml with production values"
  
  gcp:create-vpc:
    cmds:
      - gcloud compute networks create ${CLUSTER_NAME} --subnet-mode=custom
    desc: "Create VPC"

  gcp:create-subnet:
    cmds:
      - |
        gcloud compute networks subnets create subnet-1 \
          --network=${CLUSTER_NAME} \
          --region=${GCP_REGION} \
          --range=10.0.0.0/20
    desc: "Create subnet"

  gcp:create-cluster:
    desc: "Create GKE cluster"
    cmds:
      - |
        gcloud container clusters create ${CLUSTER_NAME} \
          --zone ${GCP_ZONE} \
          --network ${CLUSTER_NAME} \
          --subnetwork subnet-1 \
          --machine-type e2-standard-2 \
          --num-nodes 2 \
          --gateway-api=standard \
          --workload-pool=${GCP_PROJECT_ID}.svc.id.goog

  gcp:create-vpc-staging:
    cmds:
      - gcloud compute networks create ${CLUSTER_NAME_STAGING} --subnet-mode=custom
    desc: "Create VPC"

  gcp:create-subnet-staging:
    cmds:
      - |
        gcloud compute networks subnets create subnet-2 \
          --network=${CLUSTER_NAME_STAGING} \
          --region=${GCP_REGION} \
          --range=10.0.0.0/20
    desc: "Create subnet"

  gcp:create-cluster-staging:
    desc: "Create GKE cluster"
    cmds:
      - |
        gcloud container clusters create ${CLUSTER_NAME_STAGING} \
          --zone ${GCP_ZONE} \
          --network ${CLUSTER_NAME_STAGING} \
          --subnetwork subnet-2 \
          --machine-type e2-standard-2 \
          --num-nodes 2 \
          --gateway-api=standard \
          --workload-pool=${GCP_PROJECT_ID}.svc.id.goog

  secrets:bootstrap-workload-identity:
    desc: "Create and bind the GCP service account used by External Secrets"
    cmds:
      - |
        gcloud iam service-accounts describe ${EXTERNAL_SECRETS_GSA_EMAIL} --project=${GCP_PROJECT_ID} >/dev/null 2>&1 || \
          gcloud iam service-accounts create ${EXTERNAL_SECRETS_GSA_NAME} \
            --project=${GCP_PROJECT_ID} \
            --display-name="AUB Clubs External Secrets"
      - |
        gcloud projects add-iam-policy-binding ${GCP_PROJECT_ID} \
          --member="serviceAccount:${EXTERNAL_SECRETS_GSA_EMAIL}" \
          --role="roles/secretmanager.secretAccessor"
      - |
        gcloud iam service-accounts add-iam-policy-binding ${EXTERNAL_SECRETS_GSA_EMAIL} \
          --project=${GCP_PROJECT_ID} \
          --role="roles/iam.workloadIdentityUser" \
          --member="serviceAccount:${GCP_PROJECT_ID}.svc.id.goog[external-secrets/external-secrets]"

  secrets:sync-staging:
    desc: "Upload ../../.env as the staging JSON secret consumed by External Secrets"
    cmds:
      - node ../../operations/sync_gsm_env.js --project ${GCP_PROJECT_ID} --secret aub-clubs-staging-env --env-file ../../.env

  secrets:sync-production:
    desc: "Upload ../../.env as the production JSON secret consumed by External Secrets"
    cmds:
      - node ../../operations/sync_gsm_env.js --project ${GCP_PROJECT_ID} --secret aub-clubs-production-env --env-file ../../.env

  tls:create-secret-staging:
    desc: "Create TLS secret for staging"
    cmds:
      - gcloud container clusters get-credentials ${CLUSTER_NAME_STAGING} --zone ${GCP_ZONE}
      - kubectl create namespace aub-clubs --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret tls my-tls-cert \
          --cert=../../domain.cert.pem \
          --key=../../private.key.pem \
          --namespace=aub-clubs \
          --dry-run=client -o yaml | kubectl apply -f -

  tls:create-secret-production:
    desc: "Create TLS secret for production"
    cmds:
      - gcloud container clusters get-credentials ${CLUSTER_NAME} --zone ${GCP_ZONE}
      - kubectl create namespace aub-clubs --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret tls my-tls-cert \
          --cert=../../domain.cert.pem \
          --key=../../private.key.pem \
          --namespace=aub-clubs \
          --dry-run=client -o yaml | kubectl apply -f -

  db:seed-staging:
    desc: "Run database seeding job in staging"
    cmds:
      - gcloud container clusters get-credentials ${CLUSTER_NAME_STAGING} --zone ${GCP_ZONE}
      - kubectl delete job db-seeding -n aub-clubs --ignore-not-found
      - kubectl apply -f manual/Job.db-seeding.yaml

  db:seed-production:
    desc: "Run database seeding job in production"
    cmds:
      - gcloud container clusters get-credentials ${CLUSTER_NAME} --zone ${GCP_ZONE}
      - kubectl delete job db-seeding -n aub-clubs --ignore-not-found
      - kubectl apply -f manual/Job.db-seeding.yaml
  clean-up:
    cmds:
      - gcloud container clusters delete ${CLUSTER_NAME} --zone ${GCP_ZONE} --quiet
      - gcloud compute networks subnets delete subnet-1 --region=${GCP_REGION} --quiet
      - gcloud compute networks delete ${CLUSTER_NAME} --quiet
    desc: Delete the GCP network, subnet, firewall rules, and cluster in reverse sequence
  clean-up-s:
    cmds:
      - gcloud container clusters delete ${CLUSTER_NAME_STAGING} --zone ${GCP_ZONE} --quiet
      - gcloud compute networks subnets delete subnet-2 --region=${GCP_REGION} --quiet
      - gcloud compute networks delete ${CLUSTER_NAME_STAGING} --quiet
    desc: Delete the GCP network, subnet, firewall rules, and cluster in reverse sequence
