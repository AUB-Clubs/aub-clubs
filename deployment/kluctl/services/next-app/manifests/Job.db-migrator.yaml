apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrator
  namespace: aub-clubs
  annotations:
    kluctl.io/hook: pre-deploy
    kluctl.io/delete-job-on-success: "true"
    kluctl.io/hook-weight: "-10"
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: hamzarach69/aub-clubs-migrate:{{ apiNode.version }}
          args:
            - -path=/app/migrations
            - -database=$(MIGRATION_DATABASE_URL)
            - up
          env:
            - name: MIGRATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aub-clubs-runtime-secrets
                  key: DIRECT_URL
          envFrom:
            - secretRef:
                name: aub-clubs-runtime-secrets
      restartPolicy: OnFailure
