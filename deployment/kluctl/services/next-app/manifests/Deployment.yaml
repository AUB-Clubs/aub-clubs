apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-app
  namespace: aub-clubs
  labels:
    app: next-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: next-app
  template:
    metadata:
      labels:
        app: next-app
    spec:
      containers:
        - name: next-app
          image: hamzarach69/aub-clubs-next:{{ apiNode.version }}
          env:
            - name: PORT
              value: "3000"
            - name: INFERENCE_URL
              value: "http://inference.aub-clubs.svc.cluster.local:8080"
            - name: MCP_SERVER_URL
              value: "http://mcp-server.aub-clubs.svc.cluster.local:8081"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://{{ sharedVars.hostName }}"
            - name: INNGEST_ENV
              value: "{{ args.environment }}"
            - name: INNGEST_SERVE_HOST
              value: "https://{{ sharedVars.hostName }}"
            - name: INNGEST_SERVE_PATH
              value: "/api/inngest"
            - name: INNGEST_LOG_LEVEL
              value: "info"
          envFrom:
            - secretRef:
                name: aub-clubs-runtime-secrets
          ports:
            - containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 3000
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
