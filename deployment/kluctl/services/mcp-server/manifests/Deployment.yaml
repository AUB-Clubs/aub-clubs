apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: aub-clubs
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: hamzarach69/aub-clubs-mcp-server:{{ mcpServerNode.version }}
          env:
            - name: PORT
              value: "8081"
            - name: LOG_LEVEL
              value: "info"
          envFrom:
            - secretRef:
                name: aub-clubs-runtime-secrets
          ports:
            - containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
