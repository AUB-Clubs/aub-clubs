name: E2E

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aub_clubs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aub_clubs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aub_clubs?schema=public
      NEXT_PUBLIC_SUPABASE_API_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: e2e-dummy-key
      E2E_TEST_MODE: true
      E2E_AUTH_SECRET: ci-e2e-secret
      E2E_AUTH_USER_ID: 00000000-0000-4000-8000-000000000001
      CI: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run seed

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
